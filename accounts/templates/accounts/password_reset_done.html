<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check Your Email | Campus Connect</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --bg1:#eaf4f3;
      --bg2:#f4fbff;

      --text:#0f172a;
      --muted:#64748b;

      --border: rgba(15,23,42,.10);
      --shadow: 0 18px 50px rgba(15,23,42,.10);

      --radius: 22px;

      --teal1:#0f766e;
      --teal2:#20c997;
      --teal3:#2dd4bf;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(1100px 550px at 15% 12%, rgba(45,212,191,.22), transparent 55%),
        radial-gradient(900px 450px at 90% 0%, rgba(32,201,151,.18), transparent 55%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 55%, #ffffff 100%);
      color: var(--text);
    }

    .cardx{
      max-width:520px;
      width:100%;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background: rgba(255,255,255,.95);
      box-shadow: var(--shadow);
      padding: 28px;
      text-align:center;
    }

    .icon-wrap{
      width:70px;
      height:70px;
      border-radius:999px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg, var(--teal1), var(--teal2), var(--teal3));
      color:#041a17;
      font-size:28px;
      font-weight:900;
      box-shadow: 0 18px 40px rgba(32,201,151,.25);
    }

    h4{
      font-weight:950;
      letter-spacing:-.02em;
      margin-bottom:6px;
    }

    .muted{
      color: var(--muted);
      font-weight:650;
      margin-bottom:22px;
      line-height:1.6;
    }

    .btn-cc{
      border:0;
      border-radius:999px;
      padding:.8rem 1.4rem;
      font-weight:950;
      background: linear-gradient(135deg, var(--teal1), var(--teal2), var(--teal3));
      color:#041a17;
      box-shadow: 0 14px 30px rgba(32,201,151,.20);
      text-decoration:none;
      display:inline-block;
    }

    .btn-cc:hover{
      filter:brightness(1.03);
      color:#041a17;
    }

    .brand{
      position:absolute;
      top:20px;
      left:20px;
      font-weight:900;
      letter-spacing:-.02em;
      color:var(--text);
      text-decoration:none;
    }

    .small-note{
      font-size:.85rem;
      margin-top:14px;
      color:var(--muted);
      font-weight:600;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    body { animation: fadeIn 0.3s ease; }
    .wrap, .main { animation: fadeIn 0.3s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(15,23,42,.14); border-radius: 999px; }
  </style>
</head>

<body>

  <a href="{% url 'core:landing' %}" class="brand">Campus Connect</a>

  <div class="cardx">
    <div class="icon-wrap">📩</div>

    <h4>Check your email</h4>
    <p class="muted">
      If an account exists with that email address,
      we’ve sent a password reset link.
      Please check your inbox (and spam folder).
    </p>

    <a class="btn-cc" href="{% url 'accounts:login' %}">
      Back to login →
    </a>

    <div class="small-note">
      Didn’t receive anything? Make sure you entered the correct email.
    </div>
  </div>

</body>
</html>
