<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirm Archive • Event</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#eef3f6;
      --muted:#64748b;
      --border: rgba(15,23,42,.10);
      --shadow: 0 18px 50px rgba(15,23,42,.10);
      --radius: 18px;
      --teal1:#0f766e;
      --teal2:#20c997;
    }

    body{
      background: radial-gradient(circle at 18% 12%, #d7f3ff 0%, var(--bg) 38%, var(--bg) 100%);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px 14px;
      color:#0f172a;
    }

    .cardx{
      max-width: 680px;
      width:100%;
      background:#fff;
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .hero{
      background: linear-gradient(135deg, var(--teal1) 0%, var(--teal2) 55%, #2dd4bf 100%);
      color:#fff;
      padding: 20px;
      position:relative;
      overflow:hidden;
    }

    .hero:after{
      content:"";
      position:absolute;
      right:-80px; top:-60px;
      width:260px;height:260px;
      border-radius:999px;
      background: rgba(255,255,255,.14);
    }

    .content{
      padding: 24px;
    }

    .info-box{
      background:#f8fafc;
      border:1px solid rgba(15,23,42,.08);
      border-radius:16px;
      padding:18px;
      margin-bottom:18px;
    }

    .pill-btn{
      border-radius:999px;
      padding:10px 16px;
      font-weight:900;
    }

    .btn-cancel{
      background:#fff;
      border:1px solid rgba(15,23,42,.18);
    }

    .btn-archive{
      background:#dc2626;
      color:#fff;
      border:none;
    }

    .btn-archive:hover{
      background:#b91c1c;
    }
  </style>
</head>
<body>

<div class="cardx">

  <div class="hero">
    <div style="position:relative; z-index:1;">
      <div class="fw-bold fs-5">
        <i class="bi bi-calendar-x me-2"></i> Archive Event
      </div>
      <div class="text-white-75">
        This will hide the event and prevent new registrations.
      </div>
    </div>
  </div>

  <div class="content">

    <div class="info-box">
      <div class="fw-bold fs-5 mb-1">{{ event.title }}</div>
      <div class="text-muted small">
        {{ event.start_datetime }}
        {% if event.location %} • {{ event.location }}{% endif %}
      </div>
    </div>

    <div class="alert alert-warning rounded-4">
      Archiving prevents new registrations and removes this event from student view.
    </div>

    <div class="d-flex justify-content-end gap-2 flex-wrap mt-4">
      <a class="btn btn-cancel pill-btn" href="{% url 'events:detail' event.id %}">
        Cancel
      </a>

      <form method="post" action="{% url 'events:archive' event.id %}">
        {% csrf_token %}
        <button class="btn btn-archive pill-btn" type="submit">
          Yes, Archive
        </button>
      </form>
    </div>

  </div>
</div>

</body>
</html>
