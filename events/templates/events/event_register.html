<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | {{ event.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{ --green:#16a34a; --green2:#22c55e; --border:rgba(15,23,42,.10); }
    body{ background: linear-gradient(120deg,#fff 0%, #f7fbf8 65%, #fff 100%);
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    .cardx{ border:1px solid var(--border); border-radius:18px; box-shadow:0 10px 28px rgba(15,23,42,0.08); }
    .btn-cc{ border:0; border-radius:999px; font-weight:900; color:#06120a;
             background: linear-gradient(135deg,var(--green),var(--green2)); }
  </style>
</head>
<body>
  <div class="container py-4">
    <a href="{% url 'events:detail' event.pk %}" class="text-decoration-none">&larr; Back to event</a>

    <div class="card cardx p-4 mt-3">
      <h3 class="fw-bold mb-1">Event Registration</h3>
      <div class="text-muted mb-3">{{ event.title }} • {{ event.start_datetime|date:"M d, Y • H:i" }}</div>

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Full Name</label>
            {{ form.full_name }}
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone</label>
            {{ form.phone }}
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Email</label>
            {{ form.email }}
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Notes (optional)</label>
            {{ form.notes }}
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button class="btn btn-cc px-4" type="submit">Confirm Registration</button>
          <a class="btn btn-outline-dark" href="{% url 'events:detail' event.pk %}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
