<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Staff Items | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="py-4" style="background:#f6fbf8;">
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold mb-0">All Items</h3>
    <a href="{% url 'lostfound:staff_claims' %}" class="btn btn-outline-dark rounded-pill">View Claims</a>
  </div>

  <div class="table-responsive">
    <table class="table table-white table-hover bg-white rounded-3 overflow-hidden">
      <thead class="table-light">
        <tr>
          <th>Type</th>
          <th>Title</th>
          <th>Status</th>
          <th>Claims</th>
          <th>Posted By</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for i in items %}
          <tr>
            <td>{{ i.get_item_type_display }}</td>
            <td><a href="{% url 'lostfound:detail' i.pk %}">{{ i.title }}</a></td>
            <td>{{ i.get_status_display }}</td>
            <td>{{ i.claim_count }}</td>
            <td>{{ i.created_by.username }}</td>
            <td class="text-end">
              <a class="btn btn-sm btn-outline-success rounded-pill" href="{% url 'lostfound:mark_returned' i.pk %}">Mark Returned</a>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="6" class="text-muted">No items yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
