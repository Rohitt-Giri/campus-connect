<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Claim Item | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ background:#f6fbf8; }
    .cardx{ border:1px solid rgba(15,23,42,.08); border-radius:18px; box-shadow:0 12px 28px rgba(15,23,42,.06); }
  </style>
</head>
<body class="py-4">
<div class="container" style="max-width:860px;">
  <div class="cardx bg-white p-4">
    <h3 class="fw-bold mb-1">Claim: {{ item.title }}</h3>
    <div class="text-muted mb-3">Fill your details so staff can verify you.</div>

    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Full Name</label>
          {{ form.full_name }}
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Phone</label>
          {{ form.phone }}
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Email</label>
          {{ form.email }}
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Proof / Notes</label>
          {{ form.proof_message }}
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button class="btn btn-success rounded-pill fw-semibold" type="submit">Submit Claim</button>
        <a class="btn btn-outline-dark rounded-pill" href="{% url 'lostfound:detail' item.pk %}">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  document.querySelectorAll("input, textarea").forEach(el=>el.classList.add("form-control"));
</script>
</body>
</html>
