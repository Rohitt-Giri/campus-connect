<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Claims | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="py-4" style="background:#f6fbf8;">
<div class="container">
  <h3 class="fw-bold mb-3">My Claims</h3>

  <div class="list-group">
    {% for c in claims %}
      <a class="list-group-item list-group-item-action" href="{% url 'lostfound:detail' c.item.pk %}">
        <div class="fw-bold">{{ c.item.title }}</div>
        <div class="text-muted small">Status: {{ c.get_status_display }} • Submitted: {{ c.created_at|date:"M d, Y" }}</div>
      </a>
    {% empty %}
      <div class="alert alert-info">You haven’t submitted any claims yet.</div>
    {% endfor %}
  </div>
</div>
</body>
</html>
