<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Post Item | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ background:#f6fbf8; }
    .cardx{ border:1px solid rgba(15,23,42,.08); border-radius:18px; box-shadow:0 12px 28px rgba(15,23,42,.06); }
  </style>
</head>
<body class="py-4">
<div class="container" style="max-width:860px;">
  <div class="cardx bg-white p-4">
    <h3 class="fw-bold mb-1">Post Lost/Found Item</h3>
    <div class="text-muted mb-3">Fill details and optionally upload an image.</div>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Type</label>
          {{ form.item_type }}
        </div>
        <div class="col-md-8">
          <label class="form-label fw-semibold">Title</label>
          {{ form.title }}
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          {{ form.description }}
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Location</label>
          {{ form.location }}
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Date (optional)</label>
          {{ form.date_happened }}
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Image (optional)</label>
          {{ form.image }}
          <div class="small text-muted mt-1">Supported: JPG/PNG. Stored inside /media/lostfound/</div>
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button class="btn btn-success rounded-pill fw-semibold" type="submit">Post</button>
        <a class="btn btn-outline-dark rounded-pill" href="{% url 'lostfound:list' %}">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  // bootstrap-like form control styling
  document.querySelectorAll("input, select, textarea").forEach(el=>{
    if(!el.classList.contains("form-control") && el.type !== "file"){
      el.classList.add("form-control");
    }
    if(el.tagName === "SELECT") el.classList.add("form-select");
    if(el.type === "file") el.classList.add("form-control");
  });
</script>
</body>
</html>
