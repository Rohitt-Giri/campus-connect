<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Items | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="py-4" style="background:#f6fbf8;">
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold mb-0">My Posts</h3>
    <a href="{% url 'lostfound:create' %}" class="btn btn-success rounded-pill fw-semibold">+ Post Item</a>
  </div>

  <div class="list-group">
    {% for i in items %}
      <a class="list-group-item list-group-item-action" href="{% url 'lostfound:detail' i.pk %}">
        <div class="d-flex justify-content-between">
          <div>
            <div class="fw-bold">{{ i.title }}</div>
            <div class="text-muted small">{{ i.get_item_type_display }} • {{ i.get_status_display }} • {{ i.created_at|date:"M d, Y" }}</div>
          </div>
        </div>
      </a>
    {% empty %}
      <div class="alert alert-info">You haven’t posted anything yet.</div>
    {% endfor %}
  </div>
</div>
</body>
</html>
